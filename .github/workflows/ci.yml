name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Production Bundle
        run: npm run build
        env:
          # Providing placeholder env vars to prevent any build warnings from Vite
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key

      - name: Create mock .env for Docker 
        run: |
          echo "VITE_SUPABASE_URL=https://placeholder.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=placeholder-key" >> .env

      - name: Test Docker Build
        run: docker build -t solace-app-ci-test .
